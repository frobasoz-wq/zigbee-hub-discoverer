<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do I Already Have a Zigbee Hub? — zigbee.com.au</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #C8DCF0;
    --bg-card: #FFFFFF;
    --bg-card2: #EBF3FA;
    --bg-card3: #F0F6FB;
    --electric: #0077CC;
    --electric-light: rgba(0,119,204,0.10);
    --electric-mid: rgba(0,119,204,0.20);
    --zigbee-red: #E8003D;
    --router-green: #5A8A6A;
    --device-blue: #4A7098;
    --yes-bg: #EAF7EE;
    --yes-border: #5A9A6A;
    --yes-text: #2A6A3A;
    --caveat-bg: #FFF8E8;
    --caveat-border: #D4960A;
    --caveat-text: #7A5800;
    --no-bg: #FDEEF2;
    --no-border: #E8003D;
    --no-text: #8A0020;
    --text-dark: #141E30;
    --text-mid: #3A4A60;
    --text-light: #6A7A90;
    --border: #C0D0E0;
    --shadow: rgba(20,40,80,0.10);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-dark);
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(0,119,204,0.07) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes popIn {
    0%   { opacity: 0; transform: scale(0.92) translateY(10px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  .tool-wrapper {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 34px 20px 48px;
  }

  /* ── HEADER ── */
  .tool-header {
    text-align: center;
    margin-bottom: 28px;
    animation: fadeDown 0.6s ease both;
  }

  .tool-brand {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--electric);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .tool-brand::before, .tool-brand::after {
    content: '';
    width: 30px; height: 1px;
    background: var(--electric);
    opacity: 0.4;
  }

  .tool-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(24px, 4.5vw, 38px);
    font-weight: 800;
    line-height: 1.1;
    color: var(--text-dark);
    margin-bottom: 10px;
  }
  .tool-title span { color: var(--electric); }

  .tool-subtitle {
    font-size: 15.5px;
    color: var(--text-mid);
    max-width: 500px;
    margin: 0 auto;
    line-height: 1.55;
  }

  /* ── STEP INDICATOR ── */
  .step-indicator {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin-bottom: 24px;
    animation: fadeDown 0.6s 0.1s ease both;
  }

  .step-dot {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--bg-card);
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-light);
    transition: all 0.3s ease;
    position: relative;
    z-index: 1;
  }
  .step-dot.active {
    background: var(--electric);
    border-color: var(--electric);
    color: #fff;
    box-shadow: 0 0 0 4px var(--electric-light);
  }
  .step-dot.done {
    background: var(--router-green);
    border-color: var(--router-green);
    color: #fff;
  }
  .step-dot.done::after {
    content: '✓';
    font-size: 14px;
  }
  .step-dot.done span { display: none; }

  .step-line {
    width: 60px; height: 2px;
    background: var(--border);
    transition: background 0.3s;
  }
  .step-line.done { background: var(--router-green); }

  .step-label {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-light);
    position: absolute;
    bottom: -20px;
    white-space: nowrap;
    left: 50%;
    transform: translateX(-50%);
  }
  .step-dot.active .step-label { color: var(--electric); }
  .step-dot.done .step-label { color: var(--router-green); }

  /* ── CARD ── */
  .tool-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 32px 34px 28px;
    box-shadow: 0 4px 24px var(--shadow);
    animation: slideUp 0.4s cubic-bezier(0.4,0,0.2,1) both;
  }

  .card-eyebrow {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--electric);
    margin-bottom: 8px;
  }

  .card-question {
    font-family: 'Syne', sans-serif;
    font-size: clamp(17px, 2.6vw, 22px);
    font-weight: 700;
    color: var(--text-dark);
    margin-bottom: 22px;
    line-height: 1.3;
  }

  /* ── BRAND GRID ── */
  .brand-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 11px;
    margin-bottom: 0;
  }

  @media (max-width: 520px) {
    .brand-grid { grid-template-columns: repeat(2, 1fr); }
  }

  .brand-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 16px 10px 14px;
    background: var(--bg-card2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: 'Syne', sans-serif;
    font-size: 13.5px;
    font-weight: 700;
    color: var(--text-dark);
    text-align: center;
    line-height: 1.2;
  }
  .brand-btn:hover {
    border-color: var(--electric);
    background: var(--electric-light);
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,119,204,0.14);
  }
  .brand-btn.selected {
    border-color: var(--electric);
    background: var(--electric-light);
    box-shadow: 0 0 0 1px var(--electric);
  }

  .brand-logo {
    font-size: 28px;
    line-height: 1;
  }

  /* ── MODEL LIST ── */
  .model-list {
    display: grid;
    gap: 9px;
  }

  .model-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: var(--bg-card2);
    border: 1.5px solid var(--border);
    border-radius: 11px;
    cursor: pointer;
    transition: all 0.18s ease;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--text-dark);
    line-height: 1.3;
  }
  .model-btn:hover {
    border-color: var(--electric);
    background: var(--electric-light);
    transform: translateX(3px);
    box-shadow: 0 3px 14px rgba(0,119,204,0.12);
  }
  .model-btn.selected {
    border-color: var(--electric);
    background: var(--electric-light);
    box-shadow: 0 0 0 1px var(--electric);
  }

  .model-zigbee-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-yes    { background: var(--router-green); }
  .dot-caveat { background: var(--caveat-border); }
  .dot-no     { background: var(--zigbee-red); }

  .model-chevron {
    margin-left: auto;
    color: var(--text-light);
    font-size: 14px;
    flex-shrink: 0;
    transition: transform 0.18s;
  }
  .model-btn:hover .model-chevron { transform: translateX(3px); color: var(--electric); }

  /* ── NAV ── */
  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 24px;
    gap: 12px;
  }

  .btn-back {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-light);
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: color 0.18s;
    padding: 10px 0;
  }
  .btn-back:hover { color: var(--text-dark); }

  /* ── RESULT ── */
  .result-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 32px 34px 28px;
    box-shadow: 0 4px 24px var(--shadow);
    animation: popIn 0.45s cubic-bezier(0.4,0,0.2,1) both;
  }

  .result-device-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--bg-card2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 5px 14px;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-mid);
    margin-bottom: 16px;
  }

  .result-status-banner {
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .banner-yes    { background: var(--yes-bg);    border: 1.5px solid var(--yes-border); }
  .banner-caveat { background: var(--caveat-bg); border: 1.5px solid var(--caveat-border); }
  .banner-no     { background: var(--no-bg);     border: 1.5px solid var(--no-border); }

  .banner-icon { font-size: 26px; flex-shrink: 0; line-height: 1; margin-top: 2px; }

  .banner-text-wrap { flex: 1; }

  .banner-headline {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .banner-yes    .banner-headline { color: var(--yes-text); }
  .banner-caveat .banner-headline { color: var(--caveat-text); }
  .banner-no     .banner-headline { color: var(--no-text); }

  .banner-sub {
    font-size: 13.5px;
    font-weight: 500;
    line-height: 1.4;
  }
  .banner-yes    .banner-sub { color: var(--yes-text); opacity: 0.85; }
  .banner-caveat .banner-sub { color: var(--caveat-text); opacity: 0.85; }
  .banner-no     .banner-sub { color: var(--no-text); opacity: 0.85; }

  .result-body {
    font-size: 15px;
    color: var(--text-mid);
    line-height: 1.75;
    margin-bottom: 22px;
  }
  .result-body strong { color: var(--text-dark); font-weight: 600; }

  /* Capability chips */
  .caps-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 10px;
  }

  .caps-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 22px;
  }

  .cap-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid;
  }
  .cap-chip.good {
    background: var(--yes-bg);
    border-color: var(--yes-border);
    color: var(--yes-text);
  }
  .cap-chip.warn {
    background: var(--caveat-bg);
    border-color: var(--caveat-border);
    color: var(--caveat-text);
  }
  .cap-chip.bad {
    background: var(--no-bg);
    border-color: var(--no-border);
    color: var(--no-text);
  }

  /* Next steps */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 20px 0;
  }

  .nextsteps-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 10px;
  }

  .nextsteps-grid { display: grid; gap: 8px; margin-bottom: 20px; }

  .nextstep-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--bg-card2);
    border: 1.5px solid var(--border);
    border-radius: 11px;
    text-decoration: none;
    color: var(--text-dark);
    font-size: 14.5px;
    transition: all 0.18s;
    line-height: 1.3;
  }
  .nextstep-link:hover {
    border-color: var(--electric);
    background: var(--electric-light);
    transform: translateX(3px);
  }
  .nextstep-section {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--electric);
    display: block;
    margin-bottom: 1px;
  }
  .nextstep-icon { font-size: 17px; flex-shrink: 0; width: 26px; text-align: center; }
  .nextstep-arrow { margin-left: auto; color: var(--electric); opacity: 0.45; font-size: 14px; flex-shrink: 0; }

  /* Try another / restart */
  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn-secondary {
    flex: 1;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-mid);
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 11px 18px;
    cursor: pointer;
    transition: all 0.18s;
    text-align: center;
    min-width: 140px;
  }
  .btn-secondary:hover { border-color: var(--electric); color: var(--electric); }

  /* ── FOOTER ── */
  .tool-footer {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: var(--text-light);
    animation: fadeDown 0.6s 0.3s ease both;
  }
  .tool-footer a { color: var(--electric); text-decoration: none; }

  @media (max-width: 600px) {
    .tool-card, .result-card { padding: 22px 18px 20px; }
    .tool-wrapper { padding: 20px 14px 32px; }
    .brand-grid { grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>

// ── STATE ──
let selectedBrand = null;
let selectedModel = null;
let step = 1;

// ── STEP INDICATOR ──
function updateSteps(s) {
  step = s;
  const dots = ['dot1','dot2','dot3'];
  const lines = ['line1','line2'];
  dots.forEach((id, i) => {
    const el = document.getElementById(id);
    el.className = 'step-dot';
    if (i + 1 < s) el.classList.add('done');
    else if (i + 1 === s) el.classList.add('active');
  });
  lines.forEach((id, i) => {
    const el = document.getElementById(id);
    el.className = 'step-line';
    if (i + 1 < s) el.classList.add('done');
  });
}

// ── RENDER: BRAND STEP ──
function renderBrands() {
  updateSteps(1);
  const area = document.getElementById('toolArea');
  area.innerHTML = `
    <div class="tool-card">
      <div class="card-eyebrow">Step 1 of 2</div>
      <div class="card-question">Which brand is your device?</div>
      <div class="brand-grid">
        ${brands.map(b => `
          <button class="brand-btn${selectedBrand === b.id ? ' selected' : ''}"
            onclick="selectBrand('${b.id}')">
            <span class="brand-logo">${b.logo}</span>
            ${b.label}
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

// ── RENDER: MODEL STEP ──
function renderModels() {
  updateSteps(2);
  const brand = brands.find(b => b.id === selectedBrand);
  const modelList = models[selectedBrand] || [];
  const dotClass = { yes: 'dot-yes', caveat: 'dot-caveat', no: 'dot-no' };
  const area = document.getElementById('toolArea');
  area.innerHTML = `
    <div class="tool-card">
      <div class="card-eyebrow">Step 2 of 2 — ${brand.logo} ${brand.label}</div>
      <div class="card-question">Which device do you have?</div>
      <div class="model-list">
        ${modelList.map((m, i) => `
          <button class="model-btn" onclick="selectModel(${i})">
            <span class="model-zigbee-dot ${dotClass[m.status]}"></span>
            <span>${m.name}</span>
            <span class="model-chevron">→</span>
          </button>
        `).join('')}
      </div>
      <div class="nav-row">
        <button class="btn-back" onclick="renderBrands()">← Back to brands</button>
      </div>
    </div>
  `;
}

// ── RENDER: RESULT ──
function renderResult(modelIdx) {
  updateSteps(3);
  const brand = brands.find(b => b.id === selectedBrand);
  const m = models[selectedBrand][modelIdx];
  const bannerClass = { yes: 'banner-yes', caveat: 'banner-caveat', no: 'banner-no' };
  const icons = { yes: '✅', caveat: '⚠️', no: '❌' };

  const area = document.getElementById('toolArea');
  area.innerHTML = `
    <div class="result-card">
      <div class="result-device-tag">${brand.logo} ${brand.label} — ${m.name}</div>

      <div class="result-status-banner ${bannerClass[m.status]}">
        <div class="banner-icon">${icons[m.status]}</div>
        <div class="banner-text-wrap">
          <div class="banner-headline">${m.headline}</div>
          <div class="banner-sub">${m.sub}</div>
        </div>
      </div>

      <p class="result-body">${m.body}</p>

      <div class="caps-title">At a glance</div>
      <div class="caps-grid">
        ${m.caps.map(c => `
          <span class="cap-chip ${c.type}">
            ${c.type === 'good' ? '✓' : c.type === 'warn' ? '⚠' : '✕'}
            ${c.label}
          </span>
        `).join('')}
      </div>

      <div class="divider"></div>

      <div class="nextsteps-title">What to do next</div>
      <div class="nextsteps-grid">
        ${m.links.map(l => `
          <a class="nextstep-link" href="${l.url}" target="_blank" rel="noopener">
            <span class="nextstep-icon">${l.icon}</span>
            <span>
              <span class="nextstep-section">${l.section}</span>
              ${l.text}
            </span>
            <span class="nextstep-arrow">→</span>
          </a>
        `).join('')}
      </div>

      <div class="divider"></div>
      <div class="btn-row">
        <button class="btn-secondary" onclick="renderModels()">← Try another ${brand.label} device</button>
        <button class="btn-secondary" onclick="renderBrands()">↺ Check a different brand</button>
      </div>
    </div>
  `;
}

function selectBrand(id) {
  selectedBrand = id;
  renderModels();
}

function selectModel(idx) {
  selectedModel = idx;
  renderResult(idx);
}

// ── INIT ──
renderBrands();
</script>
